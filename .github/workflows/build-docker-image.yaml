name: Build and push Docker image

on:
  # Build the image daily.
  schedule:
    - cron: 0 0 * * *
  push:
    branches:
      - master
    paths:
      - .dockerignore
      - .github/workflows/build-docker-image.yaml
      - docker-cmd-run.sh
      - Dockerfile
  pull_request:
    branches:
      - master
    paths:
      - .dockerignore
      - .github/workflows/build-docker-image.yaml
      - docker-cmd-run.sh
      - Dockerfile
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/arch-repo-create

jobs:
  build-and-push-image:
    name: Build and push image
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Log in to container registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # Set the `latest` tag for the master branch.
            type=raw,value=latest,enable=${{ github.ref == format('refs/heads/{0}', 'master') }}
          labels: |
            org.opencontainers.image.authors=${{ vars.OCI_ANNOTATION_AUTHORS || github.repository_owner }}
            org.opencontainers.image.url=https://github.com/${{ github.repository }}
            org.opencontainers.image.documentation=https://github.com/${{ github.repository }}/blob/master/README.md
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.vendor=${{ vars.OCI_ANNOTATION_VENDOR || github.repository_owner }}
            org.opencontainers.image.licenses=AGPL-3.0-or-later
            org.opencontainers.image.title=arch-repo-create
            org.opencontainers.image.description=Builds Arch Linux packages from PKGBUILDs and assembles them into a pacman repository.
            org.opencontainers.image.base.name=archlinux:base-devel

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          provenance: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
